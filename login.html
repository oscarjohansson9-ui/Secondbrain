<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OnBrain — Logga in</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0E0D0F; --surface:#1B181C; --surface2:#221F23; --border:#2E2A2F;
    --coral:#FF8B5E; --coral-glow:rgba(255,139,94,0.16); --text:#F4EFE9;
    --muted:#9A8F88; --danger:#FF6B6B; --success:#3ECBA5;
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .wrap { width:100%; max-width:400px; }
  .brand { text-align:center; font-family:var(--serif); font-size:1.4rem; margin-bottom:36px; }
  .brand em { font-style:normal; color:var(--coral); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:36px 32px; }
  .tabs { display:flex; background:var(--surface2); border-radius:100px; padding:4px; margin-bottom:28px; }
  .tab { flex:1; text-align:center; padding:9px; border-radius:100px; font-size:0.85rem; font-weight:600; color:var(--muted); cursor:pointer; transition:all 0.2s; border:none; background:none; font-family:var(--sans); }
  .tab.active { background:var(--coral); color:#1A1210; }
  .form-group { margin-bottom:16px; }
  label { display:block; font-size:0.7rem; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:8px; }
  input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:var(--sans); font-size:0.92rem; padding:13px 15px; outline:none; transition:border-color 0.2s; }
  input:focus { border-color:var(--coral); box-shadow:0 0 0 3px var(--coral-glow); }
  .btn { width:100%; background:var(--coral); color:#1A1210; border:none; border-radius:10px; padding:14px; font-size:0.92rem; font-weight:700; font-family:var(--sans); cursor:pointer; margin-top:8px; transition:all 0.2s; }
  .btn:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 6px 20px rgba(255,139,94,0.4); }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .error { background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.25); color:var(--danger); border-radius:10px; padding:12px 16px; font-size:0.85rem; margin-bottom:16px; display:none; }
  .success { background:rgba(62,203,165,0.08); border:1px solid rgba(62,203,165,0.25); color:var(--success); border-radius:10px; padding:12px 16px; font-size:0.85rem; margin-bottom:16px; display:none; }
  .panel { display:none; }
  .panel.active { display:block; }
  .forgot { text-align:right; margin-top:8px; }
  .forgot a { font-size:0.78rem; color:var(--muted); cursor:pointer; text-decoration:none; transition:color 0.2s; }
  .forgot a:hover { color:var(--coral); }
  .hint { text-align:center; font-size:0.78rem; color:#6E655F; margin-top:20px; }

  /* Reset panel */
  #panel-reset .reset-back { font-size:0.78rem; color:var(--muted); cursor:pointer; margin-bottom:20px; display:inline-block; }
  #panel-reset .reset-back:hover { color:var(--coral); }
  #panel-reset h3 { font-family:var(--serif); font-size:1.1rem; margin-bottom:8px; }
  #panel-reset p { font-size:0.84rem; color:var(--muted); margin-bottom:20px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">on<em>brain</em></div>
  <div class="card">
    <div class="tabs" id="tabs">
      <button class="tab active" onclick="switchTab('login')">Logga in</button>
      <button class="tab" onclick="switchTab('signup')">Skapa konto</button>
    </div>

    <div class="error" id="err"></div>
    <div class="success" id="suc"></div>

    <!-- LOGIN -->
    <div class="panel active" id="panel-login">
      <div class="form-group"><label>E-post</label><input type="email" id="l-email" placeholder="dig@foretag.se" /></div>
      <div class="form-group">
        <label>Lösenord</label>
        <input type="password" id="l-pass" placeholder="••••••••" />
        <div class="forgot"><a onclick="switchTab('reset')">Glömt lösenord?</a></div>
      </div>
      <button class="btn" id="l-btn" onclick="doLogin()">Logga in</button>
    </div>

    <!-- SIGNUP -->
    <div class="panel" id="panel-signup">
      <div class="form-group"><label>Företagsnamn</label><input type="text" id="s-company" placeholder="T.ex. Acme AB" /></div>
      <div class="form-group"><label>E-post</label><input type="email" id="s-email" placeholder="dig@foretag.se" /></div>
      <div class="form-group"><label>Lösenord</label><input type="password" id="s-pass" placeholder="Minst 6 tecken" /></div>
      <button class="btn" id="s-btn" onclick="doSignup()">Skapa konto</button>
    </div>

    <!-- RESET PASSWORD -->
    <div class="panel" id="panel-reset">
      <span class="reset-back" onclick="switchTab('login')">← Tillbaka</span>
      <h3>Glömt lösenord?</h3>
      <p>Skriv in din e-post så skickar vi en länk för att återställa ditt lösenord.</p>
      <div class="form-group"><label>E-post</label><input type="email" id="r-email" placeholder="dig@foretag.se" /></div>
      <button class="btn" id="r-btn" onclick="doReset()">Skicka återställningslänk</button>
    </div>
  </div>
  <div class="hint">Er data är privat och delas aldrig</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = "https://nbtvsojkkrfamvfnddoc.supabase.co";
const SUPA_KEY = "sb_publishable_0BxO282ZNBxUD1bf-UTaUg_jRqKAswX";
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);

// Redan inloggad? Skicka till dashboard
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = "dashboard.html";
})();

function switchTab(tab) {
  ['login','signup','reset'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  // Dölj tabs när reset visas
  document.getElementById('tabs').style.display = tab === 'reset' ? 'none' : 'flex';
  document.getElementById('err').style.display = 'none';
  document.getElementById('suc').style.display = 'none';
  if (tab === 'login') document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  if (tab === 'signup') document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===1));
}

function showErr(msg) { const e=document.getElementById('err'); e.textContent=msg; e.style.display='block'; document.getElementById('suc').style.display='none'; }
function showSuc(msg) { const e=document.getElementById('suc'); e.textContent=msg; e.style.display='block'; document.getElementById('err').style.display='none'; }

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  if (!email || !pass) { showErr('Fyll i e-post och lösenord.'); return; }
  const btn = document.getElementById('l-btn');
  btn.disabled = true; btn.textContent = 'Loggar in...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Logga in';
  if (error) { showErr('Fel e-post eller lösenord.'); return; }
  window.location.href = "dashboard.html";
}

async function doSignup() {
  const company = document.getElementById('s-company').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const pass = document.getElementById('s-pass').value;
  if (!company || !email || !pass) { showErr('Fyll i alla fält.'); return; }
  if (pass.length < 6) { showErr('Lösenordet måste vara minst 6 tecken.'); return; }
  const btn = document.getElementById('s-btn');
  btn.disabled = true; btn.textContent = 'Skapar konto...';
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { company_name: company, plan: 'steg1' } }
  });
  btn.disabled = false; btn.textContent = 'Skapa konto';
  if (error) { showErr(error.message); return; }
  if (data.session) {
    window.location.href = "pricing.html";
  } else {
    showSuc('Konto skapat! Kolla din mail för att bekräfta, logga sedan in.');
  }
}

async function doReset() {
  const email = document.getElementById('r-email').value.trim();
  if (!email) { showErr('Fyll i din e-post.'); return; }
  const btn = document.getElementById('r-btn');
  btn.disabled = true; btn.textContent = 'Skickar...';
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://secondbrain-one-tau.vercel.app/reset.html'
  });
  btn.disabled = false; btn.textContent = 'Skicka återställningslänk';
  if (error) { showErr('Något gick fel: ' + error.message); return; }
  showSuc('✅ Mail skickat! Kolla din inkorg och klicka på länken.');
}

document.getElementById('l-pass').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('s-pass').addEventListener('keypress', e => { if(e.key==='Enter') doSignup(); });
document.getElementById('r-email').addEventListener('keypress', e => { if(e.key==='Enter') doReset(); });
</script>
</body>
</html>
